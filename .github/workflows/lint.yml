name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml jsonschema
      - name: Validate manifests and SKILL.md frontmatter
        run: python scripts/validate_skills.py

  claude-plugin-validate:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Claude plugin validator if available
        run: |
          if command -v claude >/dev/null 2>&1; then
            claude plugin validate .
          else
            echo "Claude CLI not available in CI; run 'claude plugin validate .' locally."
          fi
